<ion-header>
	<ion-toolbar>
		<ion-title>{{ 'QR wallet' | translate }}</ion-title>
		<ion-buttons slot="end">
			<ion-button (click)="refresh()" title="{{ 'Refresh' | translate }}">
				<ion-icon slot="icon-only" name="reload-outline"></ion-icon>
			</ion-button>
			<ion-button (click)="closeModal()" title="{{ 'Close' | translate }}">
				<ion-icon slot="icon-only" name="close-outline"></ion-icon>
			</ion-button>
		</ion-buttons>
	</ion-toolbar>
</ion-header>

<ion-content appScrollbarTheme class="ion-padding">
	<div class="main-view">
		<div class="row-full shadow full-screen">
			<ion-toolbar color="primary">
				<ion-segment scrollable="true" (ionChange)="segmentChanged($event)" [value]="ui.segmentView">
					<ion-segment-button value="s1">
						<ion-label>{{ 'My QR' | translate }}</ion-label>
					</ion-segment-button>
					<ion-segment-button value="s2">
						<ion-label>{{ 'QR use mode' | translate }}</ion-label>
					</ion-segment-button>
				</ion-segment>
			</ion-toolbar>

			<div *ngIf="ui.segmentView == 's1'" class="ion-padding">
				<div class="qr-holder" *ngIf="ui.myQrUrl">
					<img [src]="ui.myQrUrl" alt="My QR" />
				</div>
			</div>

			<div *ngIf="ui.segmentView == 's2'" class="ion-padding">
				<ion-grid fixed>
					<ion-row class="hr-group" *ngFor="let card of ui.useModeCards">
						<ion-col size="12" size-sm="12" size-md="12" size-xl="3">
							<ion-list-header class="ion-no-padding">
								<ion-label color="primary">{{ card.Name | translate }}</ion-label>
							</ion-list-header>
						</ion-col>
						<ion-col size="12" size-sm size-xl="6">
							<div class="qr-holder" *ngIf="card.QrUrl">
								<img [src]="card.QrUrl" [alt]="card.Name" />
							</div>
							<div class="qr-timeout" *ngIf="card.QrUrl">
								{{ 'Reload in' | translate }} {{ card.TimeoutInSeconds }}s
							</div>
						</ion-col>
					</ion-row>
				</ion-grid>
			</div>
		</div>
	</div>
</ion-content>
