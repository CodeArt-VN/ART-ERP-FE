<ion-header>
	<ion-toolbar>
		<ion-buttons slot="start" *ngIf="ui.selectedQrItem">
			<ion-button (click)="closeQrDetail()" title="Back">
				<ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
			</ion-button>
		</ion-buttons>
		<ion-title>QR Wallet</ion-title>
		<ion-buttons slot="end">
			<ion-button *ngIf="!ui.selectedQrItem" (click)="refresh()" title="{{ 'Refresh' | translate }}">
				<ion-icon slot="icon-only" name="reload-outline"></ion-icon>
			</ion-button>
			<ng-container *ngIf="ui.selectedQrItem as selectedItem">
				<ion-button *ngIf="selectedItem.Type !== 'voucher'" (click)="openDetailActions(selectedItem, $event)"
					title="Actions">
					<ion-icon slot="icon-only" name="ellipsis-vertical"></ion-icon>
				</ion-button>
			</ng-container>
			<ion-button (click)="closeModal()" title="{{ 'Close' | translate }}">
				<ion-icon slot="icon-only" name="close-outline"></ion-icon>
			</ion-button>
		</ion-buttons>
	</ion-toolbar>
</ion-header>

<ion-content appScrollbarTheme class="qr-wallet-content" [fullscreen]="true">
	<ion-toolbar class="filter-toolbar" *ngIf="!ui.selectedQrItem">
		<div class="filter-chip-group">
			<ion-chip [color]="ui.filterMode === 'ALL' ? 'primary' : null" (click)="setFilterMode('ALL')">
				<ion-label>ALL</ion-label>
			</ion-chip>
			<ion-chip [color]="ui.filterMode === 'Voucher' ? 'primary' : null" (click)="setFilterMode('Voucher')">
				<ion-label>Voucher</ion-label>
			</ion-chip>
			<ion-chip [color]="ui.filterMode === 'Other' ? 'primary' : null" (click)="setFilterMode('Other')">
				<ion-label>Other</ion-label>
			</ion-chip>
		</div>
	</ion-toolbar>

	<ng-container *ngIf="!ui.selectedQrItem; else qrDetailTemplate">
		<ion-list lines="none" class="qr-list">
			<ion-card class="qr-list-card qr-list-item"
				*ngFor="let item of filteredQrItems; let i = index" [class.stack-overlap]="i > 0"
				(click)="openQrDetail(item)">
				<ion-card-header>
					<div class="card-top">
						<div class="card-icon">
							<ion-icon [name]="item.Icon"></ion-icon>
						</div>
						<div class="card-meta">
							<ion-card-title>{{ item.Title }}</ion-card-title>
							<ion-card-subtitle>{{ item.Type }}</ion-card-subtitle>
						</div>
						<div class="card-actions">
							<ion-button fill="clear" size="small" (click)="saveQrItem(item, $event)">
								<ion-icon slot="icon-only" name="download-outline"></ion-icon>
							</ion-button>
							<ion-button fill="clear" size="small" (click)="shareQrItem(item, $event)">
								<ion-icon slot="icon-only" name="share-social-outline"></ion-icon>
							</ion-button>
						</div>
					</div>
				</ion-card-header>

				<ion-card-content>
					<div class="list-card-qr" [class.list-card-qr-my]="item.Type === 'my-qr'">
						<ng-container *ngIf="item.Type === 'my-qr'">
							<div class="my-qr-profile" *ngIf="myCardProfile.fullName || myCardProfile.jobTitle">
								<p class="my-qr-fullname" *ngIf="myCardProfile.fullName">{{ myCardProfile.fullName }}</p>
								<p class="my-qr-jobtitle" *ngIf="myCardProfile.jobTitle">{{ myCardProfile.jobTitle }}</p>
							</div>
							<img *ngIf="item.QrUrl" [src]="item.QrUrl" [alt]="item.Title" />
						</ng-container>
					</div>
				</ion-card-content>
			</ion-card>
		</ion-list>
	</ng-container>

	<ng-template #qrDetailTemplate>
		<div class="qr-detail-view" *ngIf="ui.selectedQrItem as item">
			<ion-card class="detail-card">
				<ion-card-subtitle>{{ item.Type }}</ion-card-subtitle>
				<ion-card-title>{{ item.Title }}</ion-card-title>
				<ion-card-subtitle>{{ item.Remark }}</ion-card-subtitle>

				<ion-card-content class="detail-head">
					<div class="detail-qr" *ngIf="item.QrUrl">
						<img [src]="item.QrUrl" [alt]="item.Title" />
					</div>

					<div class="detail-timeout" *ngIf="item.Type !== 'my-qr'">
						{{ 'Reload in' | translate }} {{ item.TimeoutInSeconds }}s
					</div>

					<ion-item lines="none">
						<ion-label>
							<h3>Title</h3>
							<p>{{ item.Title }}</p>
						</ion-label>
						<ion-button fill="clear" size="small" (click)="copyDetailValue(item.Title, $event)">
							<ion-icon slot="icon-only" name="copy-outline"></ion-icon>
						</ion-button>
					</ion-item>

					<ion-item lines="none">
						<ion-label>
							<h3>QR content</h3>
							<p>{{ item.QrContent }}</p>
						</ion-label>
						<ion-button fill="clear" size="small" (click)="copyDetailValue(item.QrContent, $event)">
							<ion-icon slot="icon-only" name="copy-outline"></ion-icon>
						</ion-button>
					</ion-item>
				</ion-card-content>



			</ion-card>
		</div>
	</ng-template>
</ion-content>
