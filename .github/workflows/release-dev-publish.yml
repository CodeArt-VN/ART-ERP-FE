# Publish web release khi push nhánh Releases/dev và commit message có "release".
# Job build: pnpm + build-web (không cần SSH secrets)
# Job deploy: upload zip + version.json qua SSH (cần secrets)
#
# Secrets (GitHub → Settings → Secrets):
#   SSH_HOST          erp.dev.appcenter.vn
#   SSH_USERNAME      codeart
#   SSH_PRIVATE_KEY   PEM deploy key (không commit scripts/deploy_github)
#   SSH_REMOTE_DIR    C:/Data/HostingSpaces/CA/erp.dev.appcenter.vn
#   SSH_PORT          (tùy chọn) 22

name: Releases/dev publish

on:
  push:
    branches:
      - Releases/dev

permissions:
  contents: read

jobs:
  build:
    if: contains(github.event.head_commit.message, 'release') || contains(github.event.head_commit.message, 'Release') || contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (submodule theo SHA đã pin trong parent)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Xác nhận submodule không drift
        run: |
          git submodule status
          test -z "$(git diff --submodule=short)" || (echo "Submodule lệch so với parent index" && exit 1)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          set -euxo pipefail
          node --version
          pnpm --version
          test -f pnpm-lock.yaml
          test -f pnpm-workspace.yaml
          pnpm install --frozen-lockfile
          npm install -g @ionic/cli
          test -d node_modules/@angular/core
          pnpm exec ng version
          ionic --version

      - name: Build web (zip + version.json)
        run: |
          set -euxo pipefail
          pnpm run build-web
          test -f version.json
          ls -la V*.zip

      - name: Chuẩn bị artifact deploy
        id: artifacts
        run: |
          set -euxo pipefail
          VERSION=$(node -p "require('./package.json').version")
          ZIP="V${VERSION}.zip"
          test -f "$ZIP"
          test -f version.json
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          mkdir -p deploy-upload
          cp "$ZIP" version.json deploy-upload/
          ls -la deploy-upload/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-upload
          path: deploy-upload/
          retention-days: 3

  deploy:
    needs: build
    if: contains(github.event.head_commit.message, 'release') || contains(github.event.head_commit.message, 'Release') || contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-upload
          path: deploy-upload

      - name: Lấy tên zip từ version.json
        id: artifacts
        run: |
          set -euxo pipefail
          VERSION=$(node -p "require('./deploy-upload/version.json').latestVersion")
          ZIP="V${VERSION}.zip"
          test -f "deploy-upload/$ZIP"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          ls -la deploy-upload/

      - name: Chuẩn bị đường dẫn Windows
        id: paths
        env:
          SSH_REMOTE_DIR: ${{ secrets.SSH_REMOTE_DIR }}
        run: |
          set -euxo pipefail
          WIN_DIR=$(echo "$SSH_REMOTE_DIR" | sed 's|\\|/|g' | sed 's|/*$||')
          # Server Win2019 + OpenSSH: SCP target dùng C:/... (không dùng /c/...)
          SCP_TARGET="${WIN_DIR}/"
          echo "win_dir=$WIN_DIR" >> "$GITHUB_OUTPUT"
          echo "scp_target=$SCP_TARGET" >> "$GITHUB_OUTPUT"
          echo "Windows path: $WIN_DIR"
          echo "SCP target:   $SCP_TARGET"

      - name: Deploy SCP + giải nén (SSH native)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes)
          TARGET="${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}"
          WEB_DIR='${{ steps.paths.outputs.win_dir }}'
          SCP_TARGET='${{ steps.paths.outputs.scp_target }}'
          ZIP='${{ steps.artifacts.outputs.zip }}'
          VER='${{ steps.artifacts.outputs.version }}'
          REMOTE_PS="${WEB_DIR}/_ci-deploy-run.ps1"

          echo "SSH test..."
          ssh "${SSH_OPTS[@]}" "$TARGET" "powershell.exe -NoProfile -Command \"Write-Host 'SSH OK'; New-Item -ItemType Directory -Path '${WEB_DIR}' -Force | Out-Null\""

          echo "Upload zip + version.json -> ${SCP_TARGET}"
          scp "${SSH_OPTS[@]}" deploy-upload/* "${TARGET}:${SCP_TARGET}"

          echo "Upload + run deploy script..."
          cat > /tmp/deploy-run.ps1 <<EOF
          \$ErrorActionPreference = 'Stop'
          \$webDir = '${WEB_DIR}'
          \$zipFile = '${ZIP}'
          \$zipPath = Join-Path \$webDir \$zipFile
          Write-Host "Deploy dir: \$webDir"
          Write-Host "Zip file: \$zipPath"
          if (-not (Test-Path -LiteralPath \$zipPath)) {
            throw "Zip not found: \$zipPath"
          }
          Expand-Archive -LiteralPath \$zipPath -DestinationPath \$webDir -Force
          Remove-Item -LiteralPath \$zipPath -Force
          Write-Host "Deployed \$zipFile (version ${VER})"
          Get-ChildItem -LiteralPath \$webDir | Select-Object -First 15 Name
          EOF

          scp "${SSH_OPTS[@]}" /tmp/deploy-run.ps1 "${TARGET}:${REMOTE_PS}"
          ssh "${SSH_OPTS[@]}" "$TARGET" "powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File \"${REMOTE_PS}\""
          ssh "${SSH_OPTS[@]}" "$TARGET" "powershell.exe -NoProfile -Command \"Remove-Item -LiteralPath '${REMOTE_PS}' -Force -ErrorAction SilentlyContinue\"" || true

          rm -f ~/.ssh/deploy_key /tmp/deploy-run.ps1
