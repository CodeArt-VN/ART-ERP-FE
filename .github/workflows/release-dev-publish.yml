# Publish web release khi push nhánh Releases/dev và commit message có "release".
# Job build: pnpm + build-web (không cần SSH secrets)
# Job deploy: upload zip + version.json qua SSH (cần secrets)
#
# Secrets: SSH_HOST, SSH_USERNAME, SSH_PRIVATE_KEY, SSH_REMOTE_DIR
# SSH_PRIVATE_KEY: PEM OpenSSH đầy đủ (-----BEGIN ... END-----)
# SSH_REMOTE_DIR: vd C:/inetpub/wwwroot/erp
# SSH_PORT: (tùy chọn) mặc định 22

name: Releases/dev publish

on:
  push:
    branches:
      - Releases/dev

permissions:
  contents: read

jobs:
  build:
    if: contains(github.event.head_commit.message, 'release') || contains(github.event.head_commit.message, 'Release') || contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (submodule theo SHA đã pin trong parent)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ github.token }}

      - name: Xác nhận submodule không drift
        run: |
          git submodule status
          test -z "$(git diff --submodule=short)" || (echo "Submodule lệch so với parent index" && exit 1)

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          set -euxo pipefail
          node --version
          pnpm --version
          test -f pnpm-lock.yaml
          test -f pnpm-workspace.yaml
          pnpm install --frozen-lockfile
          npm install -g @ionic/cli
          test -d node_modules/@angular/core
          pnpm exec ng version
          ionic --version

      - name: Build web (zip + version.json)
        run: |
          set -euxo pipefail
          pnpm run build-web
          test -f version.json
          ls -la V*.zip

      - name: Chuẩn bị artifact deploy
        id: artifacts
        run: |
          set -euxo pipefail
          VERSION=$(node -p "require('./package.json').version")
          ZIP="V${VERSION}.zip"
          test -f "$ZIP"
          test -f version.json
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          mkdir -p deploy-upload
          cp "$ZIP" version.json deploy-upload/
          ls -la deploy-upload/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-upload
          path: deploy-upload/
          retention-days: 3

  deploy:
    needs: build
    if: contains(github.event.head_commit.message, 'release') || contains(github.event.head_commit.message, 'Release') || contains(github.event.head_commit.message, 'RELEASE')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-upload
          path: deploy-upload

      - name: Lấy tên zip từ version.json
        id: artifacts
        run: |
          set -euxo pipefail
          VERSION=$(node -p "require('./deploy-upload/version.json').latestVersion")
          ZIP="V${VERSION}.zip"
          test -f "deploy-upload/$ZIP"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          ls -la deploy-upload/

      - name: Chuẩn bị đường dẫn Windows
        id: paths
        env:
          SSH_REMOTE_DIR: ${{ secrets.SSH_REMOTE_DIR }}
        run: |
          set -euxo pipefail
          RAW=$(echo "$SSH_REMOTE_DIR" | sed 's|\\|/|g' | sed 's|/*$||')
          if [[ "$RAW" == /* ]]; then
            WIN_DIR="$RAW"
          else
            WIN_DIR="$RAW"
          fi
          DRIVE=$(echo "$WIN_DIR" | cut -c1 | tr 'A-Z' 'a-z')
          REST=$(echo "$WIN_DIR" | cut -c3-)
          SCP_TARGET="/${DRIVE}${REST}/"
          echo "win_dir=$WIN_DIR" >> "$GITHUB_OUTPUT"
          echo "scp_target=$SCP_TARGET" >> "$GITHUB_OUTPUT"
          echo "Windows path: $WIN_DIR"
          echo "SCP target:   $SCP_TARGET"

      - name: Kiểm tra SSH (appleboy)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            powershell.exe -NoProfile -Command "Write-Host 'SSH connection OK'; New-Item -ItemType Directory -Path '${{ steps.paths.outputs.win_dir }}' -Force | Out-Null"

      - name: Upload zip + version.json (SCP)
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          use_insecure_cipher: true
          tar_dereference: true
          overwrite: true
          source: deploy-upload/*
          target: ${{ steps.paths.outputs.scp_target }}
          strip_components: 1

      - name: Giải nén trên Windows Server (PowerShell)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command "& {
              $ErrorActionPreference = 'Stop'
              $webDir = '${{ steps.paths.outputs.win_dir }}'
              $zipFile = '${{ steps.artifacts.outputs.zip }}'
              $appVersion = '${{ steps.artifacts.outputs.version }}'
              $zipPath = Join-Path $webDir $zipFile

              Write-Host \"Deploy dir: $webDir\"
              Write-Host 'Files before unzip:'
              Get-ChildItem -LiteralPath $webDir -Force | Select-Object Name, Length | Format-Table -AutoSize

              if (-not (Test-Path -LiteralPath $zipPath)) {
                Write-Error \"Khong thay file zip: $zipPath\"
                exit 1
              }

              Expand-Archive -LiteralPath $zipPath -DestinationPath $webDir -Force
              Remove-Item -LiteralPath $zipPath -Force
              Write-Host \"Deployed $zipFile -> $webDir (version $appVersion)\"
              Write-Host 'Files after unzip:'
              Get-ChildItem -LiteralPath $webDir -Force | Select-Object Name, Length | Format-Table -AutoSize
            }"
